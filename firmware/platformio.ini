; ============================================================================
; ESP-BMC - diymore ESP32-S3 DevKitC-1 N16R8
; PlatformIO-Projektkonfiguration
; ============================================================================
;
; framework = espidf (nicht Arduino) gemaess docs/pflichtenheft.txt Abschnitt 1
; - TinyUSB-Composite-Device (CDC+HID) und die noch zu evaluierende
;   WireGuard-Bibliothek sind auf ESP-IDF ausgelegt.
;
; Board-Override: die naechstliegende PlatformIO-Definition
; "esp32-s3-devkitc-1" geht von 8 MB Flash ohne PSRAM aus - unser Board hat
; laut docs/board-recherche.md 16 MB Flash + 8 MB PSRAM (N16R8). Ueberschrieben
; unten, PSRAM-Aktivierung zusaetzlich in sdkconfig.defaults.

[platformio]
; ESP-IDF-Projektlayout: "main/" ist die Haupt-Komponente (Standard bei
; idf.py-Projekten), nicht PlatformIOs sonst uebliches "src/".
src_dir = main

[env:esp32-s3-devkitc-1-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

board_upload.flash_size = 16MB

; Eigene Partitionstabelle (docs/entscheidungen.md, Eintrag
; "Partitionstabelle") - PlatformIOs espidf-Builder ignoriert dafuer die
; sdkconfig-Werte CONFIG_PARTITION_TABLE_CUSTOM/_FILENAME (dort trotzdem
; gesetzt, siehe sdkconfig.defaults, aber wirkungslos ohne dieses Ini-Feld -
; ohne board_build.partitions faellt PlatformIO still auf ein eigenes
; Default-Preset zurueck, keine Fehlermeldung).
board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed = 921600

; P1-Machbarkeits-Spike (docs/entscheidungen.md): trombik/esp_wireguard (ueber
; idf_component.yml) baute nicht gegen unser ESP-IDF 6.0.1 (mbedtls 4.x hat
; entropy.h/ctr_drbg.h entfernt, zusaetzlich ein GCC-Werror in wireguard.c).
; droscy/esp_wireguard (aktiv gepflegte ESPHome-Fork derselben Codebasis)
; behebt beide Punkte explizit (PSA-Crypto-Weiche, korrigierte
; Array-Initialisierer) und wird hier als normale PlatformIO-Library
; eingebunden (kein idf_component.yml, da die Fork kein ESP-IDF-Managed-
; Component-Manifest mitbringt, sondern klassisches PlatformIO-Library-Layout
; hat).
lib_deps = droscy/esp_wireguard @ ^0.4.5

; ----------------------------------------------------------------------------
; esp32-s3-devkitc-1-n8r8: gleiches Board, aber 8 statt 16 MB Flash (N8R8
; statt N16R8 - "R8" ist bei beiden identisch, 8 MB PSRAM, deshalb keine
; PSRAM-Aenderung noetig). Kein eigenes Board vorhanden, wird aber ab jetzt
; parallel zur echten Env mitgebaut/mitgepflegt (Nutzerwunsch) - unsere
; partitions.csv passt unveraendert (Summe 0x510000 Byte ≈ 5,06 MB, auch
; unter 8 MB weiterhin komfortabel Platz, siehe docs/entscheidungen.md
; "Portierbarkeit auf ESP32-S3-DevKitC-1-N8R8"). Nur board_upload.flash_size
; + der Flashgroessen-Kconfig-Eintrag (sdkconfig.defaults.<env>, gleiches
; Merge-Muster wie bei wokwi-sim unten) unterscheiden sich vom N16R8-Board.
[env:esp32-s3-devkitc-1-n8r8]
extends = env:esp32-s3-devkitc-1-n16r8
board_upload.flash_size = 8MB

; ----------------------------------------------------------------------------
; wokwi-sim: nur fuer die Wokwi-Simulation (kein echtes Board vorhanden).
; Wokwis ESP32-S3-Emulation faellt beim Octal-PSRAM-Speichertest zuverlaessig
; mit "External RAM failed memory test!" durch (Simulationslimit, kein
; Firmware-Fehler). Die aktuell simulierte Logik (P2 GpioManager) braucht
; kein PSRAM, daher hier separat deaktiviert ueber sdkconfig.defaults.wokwi-sim
; (PlatformIO mergt sdkconfig.defaults.<env> zusaetzlich zu sdkconfig.defaults).
; Die "echte" Env oben bleibt fuer das reale N16R8-Board mit PSRAM=y.
[env:wokwi-sim]
extends = env:esp32-s3-devkitc-1-n16r8
